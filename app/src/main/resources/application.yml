micronaut:
  application:
    name: barbu
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        web:
          # Prod overrides CORS_ALLOWED_ORIGINS with the deployed web origin; defaults to dev.
          allowed-origins:
            - ${CORS_ALLOWED_ORIGINS:`http://localhost:3000`}
  security:
    authentication: bearer
    intercept-url-map:
      - pattern: /prometheus
        access:
          - isAnonymous()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET}
  metrics:
    enabled: true
    binders:
      jvm:
        enabled: true
      web:
        enabled: true
    export:
      prometheus:
        enabled: true
        step: PT1M
        descriptions: true

# Defaults to an in-memory H2 (PostgreSQL mode) so the server runs with zero setup.
# Production overrides JDBC_* to point at PostgreSQL.
datasources:
  default:
    url: ${JDBC_URL:`jdbc:h2:mem:barbu;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1`}
    driver-class-name: ${JDBC_DRIVER:org.h2.Driver}
    username: ${JDBC_USER:sa}
    password: ${JDBC_PASSWORD:}
    dialect: POSTGRES
    schema-generate: NONE

flyway:
  datasources:
    default:
      enabled: true

# We expose our own /health controller, so disable the management one to avoid a route clash.
endpoints:
  health:
    enabled: false
  prometheus:
    sensitive: false
