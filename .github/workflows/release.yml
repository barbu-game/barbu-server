name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build and test
        run: ./gradlew test --no-daemon

      - name: Compute version
        id: version
        uses: paulhatch/semantic-version@v6.0.2
        with:
          tag_prefix: v
          version_format: "${major}.${minor}.${patch}"

      - name: Generate OpenAPI spec
        run: ./gradlew :app:compileJava --no-daemon

      - name: Locate spec
        id: spec
        run: echo "path=$(find app/build -name 'barbu-api-*.yml' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Tag release with the spec as an asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.spec.outputs.path }}

      - name: Stage the spec under a stable name
        run: cp "${{ steps.spec.outputs.path }}" openapi.yml

      - name: Upload the spec for the publish job
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: openapi.yml

  # Downstream (getout pattern): generate the typed client from this spec and publish
  # @barbu-game/barbu-api to GitHub Packages. barbu-web pins it, so any contract drift
  # breaks barbu-web's typecheck.
  publish-api:
    needs: release
    permissions:
      contents: read
      packages: write
    uses: barbu-game/barbu-actions/.github/workflows/publish-api.yml@main
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
